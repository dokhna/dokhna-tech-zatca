name: Dependency review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure
          # Reject licences incompatible with BSL 1.1 + Apache 2.0 conversion.
          deny-licenses: AGPL-1.0-or-later, AGPL-3.0-or-later, GPL-2.0-only, GPL-3.0-only, GPL-3.0-or-later
