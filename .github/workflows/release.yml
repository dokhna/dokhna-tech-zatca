name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore: release'
          title: 'chore: release'
        env:
          # RELEASE_PAT is a fine-grained PAT scoped to this repo with
          # contents:write + pull-requests:write. Using it (rather than
          # the default GITHUB_TOKEN) means the release PR and its
          # commits are attributed to a user, so GitHub will trigger
          # downstream workflows on push / pull_request events. The
          # default GITHUB_TOKEN suppresses those triggers to avoid
          # workflow recursion, which would otherwise leave the release
          # PR with no required-status checks.
          GITHUB_TOKEN: ${{ secrets.RELEASE_PAT }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
