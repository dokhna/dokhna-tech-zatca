name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Mint a short-lived installation token for our release GitHub App.
      # We use an App (not a PAT) for two reasons:
      #   1. App-authored events trigger downstream workflows (CI, CodeQL,
      #      dependency-review) on the release PR, just like a PAT would —
      #      whereas the default GITHUB_TOKEN suppresses those triggers.
      #   2. Combined with `commitMode: github-api` on the changesets step,
      #      commits go through the Contents API and GitHub signs them with
      #      its own GPG key, so `main`'s "Require signed commits" rule is
      #      satisfied without managing a bot GPG key ourselves.
      - name: Generate release App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
          commit: 'chore: release'
          title: 'chore: release'
          # Push via the GitHub Contents API instead of `git push`, so commits
          # are signed by GitHub's GPG key under the App identity.
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
