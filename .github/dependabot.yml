version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      types:
        patterns:
          - '@types/*'
      lint-format:
        patterns:
          - '@biomejs/*'
      build-tools:
        patterns:
          - 'tsup'
          - 'typescript'
          - 'vitest'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
