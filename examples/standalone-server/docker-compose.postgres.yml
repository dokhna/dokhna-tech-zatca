# Standalone-server stack with PostgreSQL.
#
# Boots a single Postgres + the server. The server's startup applies
# nothing automatically; you must apply the migrations once before
# first use. The `migrations` service does that lazily on boot.
#
# Usage:
#   cp .env.example .env
#   # Fill in ZATCA_SERVER_ADMIN_KEYS + ZATCA_SERVER_MASTER_KEYS
#   docker compose -f docker-compose.postgres.yml up --build

services:
  postgres:
    image: postgres:16
    container_name: zatca-server-postgres
    environment:
      POSTGRES_USER: zatca
      POSTGRES_PASSWORD: zatca
      POSTGRES_DB: zatca
    ports:
      - "5432:5432"
    volumes:
      - zatca-server-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zatca -d zatca"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrations:
    image: postgres:16
    container_name: zatca-server-migrations
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../../packages/storage-postgres/migrations:/migrations/storage:ro
      - ../../packages/server/migrations/postgres:/migrations/server:ro
    environment:
      PGPASSWORD: zatca
    entrypoint:
      - sh
      - -c
      - |
        set -e
        echo "Applying storage migrations..."
        for f in /migrations/storage/*.sql; do
          psql -h postgres -U zatca -d zatca -f "$$f"
        done
        echo "Applying server migrations..."
        for f in /migrations/server/*.sql; do
          psql -h postgres -U zatca -d zatca -f "$$f"
        done

  zatca-server:
    build:
      context: ../..
      dockerfile: packages/server/Dockerfile
    image: dokhna/zatca-server:dev
    container_name: zatca-server
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    environment:
      STORAGE_DRIVER: postgres
      DATABASE_URL: postgres://zatca:zatca@postgres:5432/zatca
      ZATCA_SERVER_HOST: 0.0.0.0
      ZATCA_SERVER_PORT: "3000"
      ZATCA_SERVER_ADMIN_KEYS: ${ZATCA_SERVER_ADMIN_KEYS}
      ZATCA_SERVER_MASTER_KEYS: ${ZATCA_SERVER_MASTER_KEYS}
      ZATCA_SERVER_ACTIVE_KID: ${ZATCA_SERVER_ACTIVE_KID:-v1}
      ZATCA_SERVER_TENANT_BEARER_ENV: ${ZATCA_SERVER_TENANT_BEARER_ENV:-live}
      ZATCA_SERVER_LOG_LEVEL: ${ZATCA_SERVER_LOG_LEVEL:-info}
      ZATCA_SERVER_TZ: ${ZATCA_SERVER_TZ:-Asia/Riyadh}
    ports:
      - "${ZATCA_SERVER_PORT:-3000}:3000"

volumes:
  zatca-server-postgres-data:
